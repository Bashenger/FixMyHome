<!doctype html>
<html lang="en" class="h-full bg-slate-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixMyHome - Register</title>

    <script>
      // Load saved theme immediately to prevent flashing
      const savedTheme = localStorage.getItem("fixmyhome_theme");
      const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms,aspect-ratio"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif !important;
      }
      body {
        font-family: 'Inter', sans-serif !important;
        background-image: linear-gradient(rgba(248, 250, 252, 0.88), rgba(248, 250, 252, 0.88)), url('./assets/images/home_repair_bg.png') !important;
        background-attachment: fixed !important;
        background-size: cover !important;
        background-repeat: no-repeat !important;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      html.dark body {
        background-image: linear-gradient(rgba(15, 23, 42, 0.94), rgba(15, 23, 42, 0.94)), url('./assets/images/home_repair_bg.png') !important;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-full text-slate-800 antialiased dark:text-slate-200">
    
    <!-- Navbar / Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm backdrop-blur-md transition-colors duration-300">
      <div class="max-w-[95%] mx-auto px-4 sm:px-8 lg:px-12">
        <div class="flex justify-between h-16 items-center">
          <a href="/index.html" class="flex items-center space-x-3 cursor-pointer group focus:outline-none">
            <div class="h-9 w-9 bg-indigo-600 group-hover:bg-indigo-700 rounded-lg flex items-center justify-center text-white text-md transition">
              <i class="fa-solid fa-house-chimney-crack"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">
              FixMy<span class="text-indigo-600 dark:text-indigo-400">Home</span>
            </span>
          </a>

          <div class="flex items-center space-x-4">
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" onclick="toggleTheme()" class="text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 focus:outline-none text-md p-2 rounded-full transition">
              <i class="fa-solid fa-moon block dark:hidden"></i>
              <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>
            <a href="/index.html" class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">
              <i class="fa-solid fa-arrow-left mr-1"></i> Back to Home
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <div class="max-w-md w-full space-y-6 bg-white/95 dark:bg-slate-900/95 border border-slate-200 dark:border-slate-800 p-8 rounded-2xl shadow-xl backdrop-blur-md">
        
        <div class="text-center">
          <div class="mx-auto h-12 w-12 bg-indigo-100 dark:bg-indigo-950/50 rounded-xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 text-2xl">
            <i class="fa-solid fa-user-plus animate-pulse"></i>
          </div>
          <h2 class="mt-4 text-3xl font-black text-slate-900 dark:text-white tracking-tight">Create Account</h2>
          <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">
            Join the neighborhood proximity service network today.
          </p>
        </div>

        <!-- Role Selector Tabs -->
        <div class="grid grid-cols-2 p-1 bg-slate-100 dark:bg-slate-950 rounded-xl">
          <button type="button" id="tab-homeowner" onclick="setRole('homeowner')" 
            class="py-2.5 text-xs font-bold rounded-lg transition-all text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 shadow-sm">
            <i class="fa-solid fa-house mr-1.5"></i> Homeowner
          </button>
          <button type="button" id="tab-provider" onclick="setRole('provider')" 
            class="py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200">
            <i class="fa-solid fa-screwdriver-wrench mr-1.5"></i> Service Pro
          </button>
        </div>

        <form class="space-y-4" onsubmit="handleRegister(event)">
          <!-- Hidden Role Input -->
          <input type="hidden" id="role" name="role" value="homeowner">

          <div class="space-y-3">
            <div>
              <label for="name" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-1.5">Full Name</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                  <i class="fa-solid fa-user text-xs"></i>
                </span>
                <input id="name" name="name" type="text" required 
                  class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg pl-9 pr-3 py-2 text-sm text-slate-800 dark:text-white transition outline-none" 
                  placeholder="e.g. John Doe">
              </div>
            </div>

            <div>
              <label for="email" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-1.5">Email Address</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                  <i class="fa-solid fa-envelope text-xs"></i>
                </span>
                <input id="email" name="email" type="email" required 
                  class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg pl-9 pr-3 py-2 text-sm text-slate-800 dark:text-white transition outline-none" 
                  placeholder="e.g. john@example.com">
              </div>
            </div>

            <div>
              <label for="password" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-1.5">Password</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                  <i class="fa-solid fa-lock text-xs"></i>
                </span>
                <input id="password" name="password" type="password" required 
                  class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg pl-9 pr-3 py-2 text-sm text-slate-800 dark:text-white transition outline-none" 
                  placeholder="••••••••">
              </div>
            </div>

            <!-- Service Provider Specific Fields -->
            <div id="provider-fields" class="hidden space-y-3 pt-2 border-t border-slate-100 dark:border-slate-800 animate-fade-in-up">
              <div>
                <label for="specialty" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-1.5">Service Specialty</label>
                <select id="specialty" name="specialty" 
                  class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg px-3 py-2 text-sm text-slate-800 dark:text-white transition outline-none">
                  <option value="Plumbing Solutions">Plumbing Solutions</option>
                  <option value="Electrical Engineering">Electrical Engineering</option>
                  <option value="Carpentry & Structural">Carpentry & Structural</option>
                  <option value="HVAC Systems">HVAC Systems</option>
                  <option value="Appliance Service">Appliance Service</option>
                </select>
              </div>

              <div>
                <label for="license" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-1.5">Certification / License ID</label>
                <div class="relative">
                  <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <i class="fa-solid fa-file-contract text-xs"></i>
                  </span>
                  <input id="license" name="license" type="text" 
                    class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg pl-9 pr-3 py-2 text-sm text-slate-800 dark:text-white transition outline-none" 
                    placeholder="e.g. LIC-PL-998877">
                </div>
              </div>
            </div>
          </div>

          <div class="pt-2">
            <button type="submit" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-xs transition duration-200 shadow-md flex items-center justify-center gap-1.5 focus:outline-none">
              Register Account <i class="fa-solid fa-user-plus text-[10px]"></i>
            </button>
          </div>
        </form>

        <div class="text-center pt-2">
          <p class="text-xs text-slate-500 dark:text-slate-400">
            Already have an active account? 
            <a href="/login.html" class="font-bold text-indigo-600 dark:text-indigo-400 hover:underline">Sign In Here</a>
          </p>
        </div>

      </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[200] space-y-2 pointer-events-none"></div>

    <script>
      // Theme Toggle Utility
      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem("fixmyhome_theme", isDark ? "dark" : "light");
      }

      // Check current session state on load
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          const res = await fetch('/api/session');
          const data = await res.json();
          if (data.loggedIn) {
            window.location.href = '/index.html';
          }
        } catch (err) {
          console.error("Session check failed:", err);
        }
      });

      // Tab switcher role handler
      function setRole(role) {
        document.getElementById('role').value = role;
        
        const tabHomeowner = document.getElementById('tab-homeowner');
        const tabProvider = document.getElementById('tab-provider');
        const providerFields = document.getElementById('provider-fields');
        const licenseInput = document.getElementById('license');

        if (role === 'homeowner') {
          tabHomeowner.className = "py-2.5 text-xs font-bold rounded-lg transition-all text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 shadow-sm";
          tabProvider.className = "py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
          providerFields.classList.add('hidden');
          licenseInput.removeAttribute('required');
        } else {
          tabProvider.className = "py-2.5 text-xs font-bold rounded-lg transition-all text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-900 shadow-sm";
          tabHomeowner.className = "py-2.5 text-xs font-bold rounded-lg transition-all text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200";
          providerFields.classList.remove('hidden');
          licenseInput.setAttribute('required', 'true');
        }
      }

      // Toast Notification System
      function showToast(message, type = 'info') {
        const toastContainer = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `p-3 rounded-lg shadow-lg text-white text-xs font-semibold pointer-events-auto flex items-center space-x-2 border transition duration-300 transform translate-y-2 opacity-0 ${
          type === 'success' ? 'bg-emerald-600 border-emerald-500' :
          type === 'error' ? 'bg-rose-600 border-rose-500' :
          type === 'warning' ? 'bg-amber-600 border-amber-500' : 'bg-slate-800 border-slate-700'
        }`;
        
        const iconMap = {
          success: '<i class="fa-solid fa-circle-check"></i>',
          error: '<i class="fa-solid fa-circle-exclamation"></i>',
          warning: '<i class="fa-solid fa-triangle-exclamation"></i>',
          info: '<i class="fa-solid fa-circle-info"></i>'
        };
        
        toast.innerHTML = `${iconMap[type] || ''} <span>${message}</span>`;
        toastContainer.appendChild(toast);
        
        setTimeout(() => {
          toast.classList.remove('translate-y-2', 'opacity-0');
        }, 10);
        
        setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-y-2');
          setTimeout(() => {
            toast.remove();
          }, 300);
        }, 4000);
      }

      // Handle Registration Submit
      async function handleRegister(event) {
        event.preventDefault();
        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;
        const specialty = document.getElementById("specialty").value;
        const license = document.getElementById("license").value.trim();

        const payload = { email, password, name, role };
        if (role === 'provider') {
          payload.specialty = specialty;
          payload.license = license;
        }

        try {
          const res = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await res.json();
          if (res.ok && data.success) {
            showToast("Registration successful! Initiating login profile...", "success");
            setTimeout(() => {
              window.location.href = '/index.html';
            }, 1000);
          } else {
            showToast(data.error || "Registration validation failed.", "error");
          }
        } catch (err) {
          showToast("Network disconnect or server offline.", "error");
        }
      }
    </script>
  </body>
</html>
