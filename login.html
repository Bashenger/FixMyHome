<!doctype html>
<html lang="en" class="h-full bg-slate-50">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FixMyHome - Sign In</title>

    <script>
      // Load saved theme immediately to prevent flashing
      const savedTheme = localStorage.getItem("fixmyhome_theme");
      const systemPrefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <script src="https://cdn.tailwindcss.com?plugins=typography,forms,aspect-ratio"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              heading: ['Outfit', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Outfit', sans-serif !important;
      }
      body {
        font-family: 'Inter', sans-serif !important;
        background-image: linear-gradient(rgba(248, 250, 252, 0.88), rgba(248, 250, 252, 0.88)), url('./assets/images/home_repair_bg.png') !important;
        background-attachment: fixed !important;
        background-size: cover !important;
        background-repeat: no-repeat !important;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      html.dark body {
        background-image: linear-gradient(rgba(15, 23, 42, 0.94), rgba(15, 23, 42, 0.94)), url('./assets/images/home_repair_bg.png') !important;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-full text-slate-800 antialiased dark:text-slate-200">
    
    <!-- Navbar / Header -->
    <header class="bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm backdrop-blur-md transition-colors duration-300">
      <div class="max-w-[95%] mx-auto px-4 sm:px-8 lg:px-12">
        <div class="flex justify-between h-16 items-center">
          <a href="/index.html" class="flex items-center space-x-3 cursor-pointer group focus:outline-none">
            <div class="h-9 w-9 bg-indigo-600 group-hover:bg-indigo-700 rounded-lg flex items-center justify-center text-white text-md transition">
              <i class="fa-solid fa-house-chimney-crack"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">
              FixMy<span class="text-indigo-600 dark:text-indigo-400">Home</span>
            </span>
          </a>

          <div class="flex items-center space-x-4">
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" onclick="toggleTheme()" class="text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 focus:outline-none text-md p-2 rounded-full transition">
              <i class="fa-solid fa-moon block dark:hidden"></i>
              <i class="fa-solid fa-sun hidden dark:block"></i>
            </button>
            <a href="/index.html" class="text-xs font-semibold text-indigo-600 dark:text-indigo-400 hover:underline">
              <i class="fa-solid fa-arrow-left mr-1"></i> Back to Home
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
      <div class="max-w-md w-full space-y-8 bg-white/95 dark:bg-slate-900/95 border border-slate-200 dark:border-slate-800 p-8 rounded-2xl shadow-xl backdrop-blur-md">
        
        <div class="text-center">
          <div class="mx-auto h-12 w-12 bg-indigo-100 dark:bg-indigo-950/50 rounded-xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 text-2xl">
            <i class="fa-solid fa-right-to-bracket animate-pulse"></i>
          </div>
          <h2 class="mt-4 text-3xl font-black text-slate-900 dark:text-white tracking-tight">Account Sign In</h2>
          <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">
            Access your homeowner profile or service provider dispatch dashboard.
          </p>
        </div>

        <form class="mt-8 space-y-5" onsubmit="handleLogin(event)">
          <div class="space-y-4">
            <div>
              <label for="email" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider mb-2">Email Address</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                  <i class="fa-solid fa-envelope text-xs"></i>
                </span>
                <input id="email" name="email" type="email" autocomplete="email" required 
                  class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg pl-9 pr-3 py-2.5 text-sm text-slate-800 dark:text-white transition outline-none" 
                  placeholder="e.g. user@fixmyhome.com">
              </div>
            </div>

            <div>
              <div class="flex justify-between items-center mb-2">
                <label for="password" class="block text-xs font-bold text-slate-600 dark:text-slate-400 uppercase tracking-wider">Password</label>
                <a href="#" onclick="showToast('Password reset option is locked in course exercises.', 'info'); return false;" class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 hover:underline">Forgot password?</a>
              </div>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                  <i class="fa-solid fa-lock text-xs"></i>
                </span>
                <input id="password" name="password" type="password" autocomplete="current-password" required 
                  class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-500 rounded-lg pl-9 pr-3 py-2.5 text-sm text-slate-800 dark:text-white transition outline-none" 
                  placeholder="••••••••">
              </div>
            </div>
          </div>

          <div class="flex items-center">
            <input id="remember-me" name="remember-me" type="checkbox" 
              class="h-4 w-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
            <label for="remember-me" class="ml-2 block text-xs text-slate-500 dark:text-slate-400 font-medium cursor-pointer">
              Remember my session parameters
            </label>
          </div>

          <div>
            <button type="submit" 
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg text-xs transition duration-200 shadow-md flex items-center justify-center gap-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
              Sign In <i class="fa-solid fa-arrow-right-to-bracket text-[10px]"></i>
            </button>
          </div>
        </form>

        <div class="relative flex py-2 items-center">
          <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
          <span class="flex-shrink mx-4 text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">or connect via</span>
          <div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button onclick="showToast('Social integrations locked in API prototypes.', 'info')" 
            class="flex items-center justify-center py-2 px-4 border border-slate-200 dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-950/50 hover:bg-slate-100 dark:hover:bg-slate-900 text-xs font-semibold text-slate-600 dark:text-slate-300 transition">
            <i class="fa-brands fa-google text-rose-500 mr-2"></i> Google
          </button>
          <button onclick="showToast('Social integrations locked in API prototypes.', 'info')" 
            class="flex items-center justify-center py-2 px-4 border border-slate-200 dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-950/50 hover:bg-slate-100 dark:hover:bg-slate-900 text-xs font-semibold text-slate-600 dark:text-slate-300 transition">
            <i class="fa-brands fa-apple text-slate-900 dark:text-white mr-2"></i> Apple
          </button>
        </div>

        <div class="text-center pt-2">
          <p class="text-xs text-slate-500 dark:text-slate-400">
            Don't have an active account? 
            <a href="/register.html" class="font-bold text-indigo-600 dark:text-indigo-400 hover:underline">Register Here</a>
          </p>
        </div>

      </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[200] space-y-2 pointer-events-none"></div>

    <script>
      // Theme Toggle Utility
      function toggleTheme() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem("fixmyhome_theme", isDark ? "dark" : "light");
      }

      // Check current session state on load
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          const res = await fetch('/api/session');
          const data = await res.json();
          if (data.loggedIn) {
            // Already logged in, redirect based on role
            if (data.user.role === 'admin') {
              window.location.href = '/admin.html';
            } else {
              window.location.href = '/index.html';
            }
          }
        } catch (err) {
          console.error("Session check failed:", err);
        }

        // Show warning if unauthorized query parameter is present
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === 'unauthorized') {
          showToast("Access Denied: Admin session authentication required.", "error");
        }
      });

      // Toast Notification System
      function showToast(message, type = 'info') {
        const toastContainer = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `p-3 rounded-lg shadow-lg text-white text-xs font-semibold pointer-events-auto flex items-center space-x-2 border transition duration-300 transform translate-y-2 opacity-0 ${
          type === 'success' ? 'bg-emerald-600 border-emerald-500' :
          type === 'error' ? 'bg-rose-600 border-rose-500' :
          type === 'warning' ? 'bg-amber-600 border-amber-500' : 'bg-slate-800 border-slate-700'
        }`;
        
        const iconMap = {
          success: '<i class="fa-solid fa-circle-check"></i>',
          error: '<i class="fa-solid fa-circle-exclamation"></i>',
          warning: '<i class="fa-solid fa-triangle-exclamation"></i>',
          info: '<i class="fa-solid fa-circle-info"></i>'
        };
        
        toast.innerHTML = `${iconMap[type] || ''} <span>${message}</span>`;
        toastContainer.appendChild(toast);
        
        setTimeout(() => {
          toast.classList.remove('translate-y-2', 'opacity-0');
        }, 10);
        
        setTimeout(() => {
          toast.classList.add('opacity-0', 'translate-y-2');
          setTimeout(() => {
            toast.remove();
          }, 300);
        }, 4000);
      }

      // Handle Form Submit login
      async function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
          const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (res.ok && data.success) {
            showToast(`Sign in approved! Welcome back, ${data.user.name}`, "success");
            setTimeout(() => {
              if (data.user.role === 'admin') {
                window.location.href = '/admin.html';
              } else {
                window.location.href = '/index.html';
              }
            }, 1000);
          } else {
            showToast(data.error || "Login verification failed.", "error");
          }
        } catch (err) {
          showToast("Network disconnect or server offline.", "error");
        }
      }
    </script>
  </body>
</html>
